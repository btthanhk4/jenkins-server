services:
  jenkins:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        NODE_MAJOR: "22"
    image: jenkins-devops:latest
    container_name: jenkins
    restart: unless-stopped

    # Cho phép autoheal tự restart khi healthcheck = unhealthy (treo/deadlock)
    labels:
      autoheal: "true"

    # Jenkins cần thời gian shutdown gọn (drain build) trước khi bị kill
    stop_grace_period: 90s
    # /dev/shm lớn hơn cho browser test / trình biên dịch nặng
    shm_size: "1g"

    # Chống "Too many open files" / cạn process khi chạy nhiều job song song
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc: 32768

    ports:
      - "${JENKINS_HTTP_PORT:-8080}:8080"     # Web UI
      - "${JENKINS_AGENT_PORT:-50000}:50000"  # Kết nối agent (JNLP)

    environment:
      TZ: "${TZ:-Asia/Ho_Chi_Minh}"
      JENKINS_URL: "${JENKINS_URL}"
      JENKINS_ADMIN_ID: "${JENKINS_ADMIN_ID}"
      JENKINS_ADMIN_PASSWORD: "${JENKINS_ADMIN_PASSWORD}"
      JENKINS_ADMIN_EMAIL: "${JENKINS_ADMIN_EMAIL}"
      CASC_JENKINS_CONFIG: "/var/jenkins_home/casc/jenkins.yaml"
      # GitLab credentials (giá trị thật nằm trong .env, không push)
      GITLAB_URL: "${GITLAB_URL:-https://gitlab.com}"
      GITLAB_USER: "${GITLAB_USER}"
      GITLAB_TOKEN: "${GITLAB_TOKEN}"
      # --- JVM tuning: G1GC + để JVM tự dùng % RAM của container ---
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=false
        -Djava.awt.headless=true
        -XX:+UseG1GC
        -XX:+UseStringDeduplication
        -XX:MaxRAMPercentage=70.0
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:+ExitOnOutOfMemoryError
        -Dhudson.model.LoadStatistics.clock=2000
        -Djenkins.model.Jenkins.slaveAgentPort=50000
        -Djenkins.model.Jenkins.slaveAgentPortEnforce=true

    volumes:
      # Dữ liệu Jenkins nằm trực tiếp trên host (dễ backup, khớp hạ tầng VM)
      - ${JENKINS_HOME_HOST:-/data/jenkins_home}:/var/jenkins_home
      # Nạp cấu hình JCasC (read-only)
      - ./casc/jenkins.yaml:/var/jenkins_home/casc/jenkins.yaml:ro
      # Điều khiển Docker của host (Docker-out-of-Docker)
      - /var/run/docker.sock:/var/run/docker.sock
      # Đồng bộ giờ với host
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

    # Cho user jenkins (uid 1000) quyền dùng /var/run/docker.sock.
    # Lấy GID: `getent group docker | cut -d: -f3` rồi đặt vào .env: DOCKER_GID=...
    group_add:
      - "${DOCKER_GID:-999}"

    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

    # Giới hạn tài nguyên (docker compose v2 honor deploy.resources.limits)
    # VM 24GB/12core: cấp 10G cho Jenkins, chừa ~14G cho OS + build container
    # (build qua docker.sock chạy NGOÀI limit này nên phải chừa RAM host).
    deploy:
      resources:
        limits:
          memory: "${JENKINS_MEM_LIMIT:-10g}"
          cpus: "${JENKINS_CPU_LIMIT:-10}"
          pids: 8192          # trần số process (chặn fork-bomb do build lỗi)
        reservations:
          memory: "2g"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - jenkins-net

  # ==========================================================================
  # Autoheal: tự restart container nào có label autoheal=true khi UNHEALTHY.
  # Lấp khoảng trống mà restart policy của Docker không xử lý (treo/deadlock).
  # ==========================================================================
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: jenkins-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "15"       # quét mỗi 15s
      AUTOHEAL_START_PERIOD: "180"  # bỏ qua 180s đầu (Jenkins đang khởi động)
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: "90"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

# Network tạo sẵn bằng tay trên host: `docker network create jenkins-net`
# (Makefile target `network` sẽ tự tạo nếu chưa có)
networks:
  jenkins-net:
    name: jenkins-net
    external: true
