# ============================================================================
# Giá trị MẶC ĐỊNH (khớp cấu trúc thật cụm BNF). Mỗi service tạo values-<svc>.yaml.
# appName  = {project}-{int}-{env}   -> tên deployment/service/hpa/container
# appLabel = nhãn app (selector), vd: wallet-be-admin
# LƯU Ý: chart CHỈ tham chiếu secret theo TÊN. Secret do IaC/pipeline tạo.
# ============================================================================

appName: bnf-example-dev
appLabel: example

image:
  repository: registry.gitlab.com/neonstudio/bnf/release-image/example
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecret: bnf-example-dev-pull-secret   # secret kiểu dockerconfigjson

containerPort: 2222        # cổng app (đặt tên 'app-port')
servicePort: 2222
replicaCount: 1            # bị bỏ qua nếu hpa.enabled=true

terminationGracePeriodSeconds: 250
preStopSleep: 160          # sleep trước khi tắt (0 = tắt lifecycle)

# true = cho phép tạo khung TRƯỚC khi secret tồn tại (secret tạo sau vẫn OK).
# Đặt false khi muốn chặt chẽ (bắt buộc secret phải có).
secretsOptional: true

# --- Env công khai inline (KHÔNG để secret ở đây) ---
env:
  NODE_ENV: dev
  TZ: Asia/Ho_Chi_Minh

# --- Secret kiểu env var (envFrom) -> app đọc qua process.env ---
envFromSecrets: []
#   - secret-env-be1

# --- Secret mount thành FILE ---
fileSecrets: []
#   - volumeName: env-file
#     secretName: env-file-secret-wallet-be-admin
#     mountPath: /usr/src/app/config/env/dev.js
#     subPath: dev.js

# --- Thư mục tạm (emptyDir) ---
emptyDirs:
  - { name: tmp-data, mountPath: /tmp }
  - { name: sails-tmp, mountPath: /usr/src/app/.tmp }

# --- hostAliases (map hostname -> IP, vd cụm MongoDB) ---
hostAliases: []
#   - { ip: 10.0.20.55, hostnames: [mongodb-v8-node1] }

resources:
  requests: { cpu: 512m, memory: 1Gi }
  limits:   { cpu: 1024m, memory: 1512Mi }

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

probes:
  enabled: true
  path: /

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 1
  cpu: 80
  memory: 75

ingress:
  enabled: false
  className: kong
  host: ""
  rewriteTarget: true
