# ============================================================================
# Jenkins Configuration as Code (JCasC)
# Docs: https://github.com/jenkinsci/configuration-as-code-plugin
# CHỈ dùng các key chuẩn, ổn định giữa các version. Mọi ${VAR} đọc từ .env.
# Hardening nâng cao (SSHD, crumb, agentProtocols...) đã bỏ vì schema đổi theo
# version và gây boot-fail; thêm lại sau qua UI hoặc key đã kiểm chứng.
# ============================================================================

jenkins:
  systemMessage: "Jenkins DevOps — Managed by Configuration as Code."
  # 12 vCPU / 24GB: 4 executor an toàn cho controller all-in-one.
  numExecutors: 4
  mode: NORMAL
  scmCheckoutRetryCount: 3
  labelString: "built-in linux docker"
  quietPeriod: 3

  # --- Đăng nhập nội bộ ---
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  # --- Phân quyền theo ma trận ---
  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:${JENKINS_ADMIN_ID}"
        - "Overall/Read:authenticated"

  # --- Bảo mật kênh controller <-> agent (key ổn định) ---
  remotingSecurity:
    enabled: true

# ============================================================================
# Cấu hình chung
# ============================================================================
unclassified:
  location:
    url: "${JENKINS_URL}"
    adminAddress: "${JENKINS_ADMIN_EMAIL}"

# ============================================================================
# Công cụ (đường dẫn khớp image trong docker/Dockerfile)
# ============================================================================
tool:
  git:
    installations:
      - name: Default
        home: "git"
  maven:
    installations:
      - name: "Maven-3.9"
        home: "/opt/maven"

# ============================================================================
# Credentials - đọc từ ENV (.env), KHÔNG hardcode secret vào git.
# ============================================================================
credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "gitlab-credentials"
              username: "${GITLAB_USER}"
              password: "${GITLAB_TOKEN}"
              description: "GitLab HTTPS + PAT (user/token)"
          - string:
              scope: GLOBAL
              id: "gitlab-api-token"
              secret: "${GITLAB_TOKEN}"
              description: "GitLab PAT (secret text)"
