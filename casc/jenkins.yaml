# ============================================================================
# Jenkins Configuration as Code (JCasC)
# Docs: https://github.com/jenkinsci/configuration-as-code-plugin
# Mọi ${VAR} được đọc từ biến môi trường (khai báo trong .env / docker-compose).
# ============================================================================

jenkins:
  systemMessage: "Jenkins DevOps — Managed by Configuration as Code. KHÔNG chỉnh tay trên UI."
  # 12 vCPU / 24GB: 4 executor an toàn cho controller all-in-one.
  # Nâng lên 6 nếu build phần lớn chạy trong container (nhẹ cho JVM).
  numExecutors: 4
  mode: NORMAL
  scmCheckoutRetryCount: 3
  labelString: "built-in linux docker"
  quietPeriod: 3

  # --- Bảo mật đăng nhập nội bộ ---
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  # --- Phân quyền theo ma trận ---
  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:${JENKINS_ADMIN_ID}"
        - "Overall/Read:authenticated"

  # --- Hardening: bảo mật kênh controller <-> agent ---
  # (Jenkins hiện đại đã tự tắt các agent protocol cũ; không cần khai báo tay.)
  remotingSecurity:
    enabled: true

  # --- CSRF crumb (bật sẵn; excludeClientIP=true khi chạy sau reverse proxy) ---
  crumbIssuer:
    standard:
      excludeClientIPFromCrumb: true

# ============================================================================
# Bảo mật nâng cao
# ============================================================================
security:
  # Tắt SSHD server tích hợp (giảm bề mặt tấn công; -1 = disabled)
  sSHD:
    port: -1
  # Ép Job DSL/script chạy trong sandbox
  globalJobDslSecurityConfiguration:
    useScriptSecurity: true
  # Ai trigger build thì chạy dưới quyền người đó
  queueItemAuthenticator:
    authenticators:
      - global:
          strategy: triggeringUsersAuthorizationStrategy

# ============================================================================
# Cấu hình chung
# ============================================================================
unclassified:
  location:
    url: "${JENKINS_URL}"
    adminAddress: "${JENKINS_ADMIN_EMAIL}"

  # Tắt gửi thống kê usage ra ngoài
  usageStatistics:
    enabled: false

  # --- Slack (bỏ comment + tạo credential 'slack-token' khi dùng) ---
  # slackNotifier:
  #   teamDomain: "your-team"
  #   tokenCredentialId: "slack-token"

# ============================================================================
# Công cụ (đường dẫn khớp với image trong docker/Dockerfile)
# ============================================================================
tool:
  git:
    installations:
      - name: Default
        home: "git"
  maven:
    installations:
      - name: "Maven-3.9"
        home: "/opt/maven"
  # Node đã có sẵn global trên PATH của image -> gọi trực tiếp trong pipeline.

# ============================================================================
# Credentials - đọc từ ENV (.env), KHÔNG hardcode secret vào git.
# ============================================================================
credentials:
  system:
    domainCredentials:
      - credentials:
          # Dùng cho HTTPS clone + hầu hết thao tác (user + Personal Access Token)
          - usernamePassword:
              scope: GLOBAL
              id: "gitlab-credentials"
              username: "${GITLAB_USER}"
              password: "${GITLAB_TOKEN}"
              description: "GitLab HTTPS + PAT (user/token)"
          # Dùng trong pipeline qua withCredentials(string(...)) hoặc gọi API
          - string:
              scope: GLOBAL
              id: "gitlab-api-token"
              secret: "${GITLAB_TOKEN}"
              description: "GitLab PAT (secret text)"

# ----------------------------------------------------------------------------
# (Tuỳ chọn) Kết nối GitLab cho plugin gitlab (webhook / commit status).
# Bật sau khi base chạy ổn. Nếu key báo lỗi lúc load CASC, cấu hình qua UI:
