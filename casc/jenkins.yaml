# ============================================================================
# Jenkins Configuration as Code (JCasC)
# Tài liệu: https://github.com/jenkinsci/configuration-as-code-plugin
# Mọi ${VAR} được đọc từ biến môi trường (khai báo trong .env / docker-compose).
# ============================================================================

jenkins:
  systemMessage: "Jenkins - Managed by Configuration as Code. KHÔNG chỉnh tay trên UI."
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 3
  labelString: "built-in linux docker"

  # --- Bảo mật: đăng nhập bằng user/pass nội bộ ---
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  # --- Phân quyền theo ma trận ---
  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:${JENKINS_ADMIN_ID}"
        - "Overall/Read:authenticated"

  # --- Không cho build chạy trên node controller (bảo mật) ---
  # Đặt numExecutors ở trên = 2 nếu muốn dùng controller làm agent (all-in-one).
  # Với môi trường lớn nên = 0 và dùng agent riêng.

security:
  queueItemAuthenticator:
    authenticators:
      - global:
          strategy: triggeringUsersAuthorizationStrategy

unclassified:
  location:
    url: "${JENKINS_URL}"
    adminAddress: "${JENKINS_ADMIN_EMAIL}"

  # --- Slack (điền token qua credentials nếu dùng) ---
  # slackNotifier:
  #   teamDomain: "your-team"
  #   tokenCredentialId: "slack-token"

tool:
  git:
    installations:
      - name: Default
        home: "git"
  maven:
    installations:
      - name: "Maven-3.9"
        home: "/opt/apache-maven-3.9.11"
  nodejs:
    installations:
      - name: "Node-22"
        home: "/usr/bin"

